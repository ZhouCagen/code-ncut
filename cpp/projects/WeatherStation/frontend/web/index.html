<!DOCTYPE html> <!-- 告诉浏览器是 HTML5 文档 -->

<html lang = "zh-CN"> <!-- 定义网页的根元素，同时指定语言为中文（中国大陆）-->
<head> <!-- 网页头部，放元信息，不是直接显示内容-->
    <meta charset = "UTF-8">  <!-- 指定网页编码为 UTF-8 让浏览器正确显示中文、表情符号（🌡💧🌪）-->
    <title>气象站数据面板</title>
    <link rel = "stylesheet" href = "style.css">
     <!-- 作用：把外部 CSS 文件链接进 HTML  rel="stylesheet" → 表示这是样式表 href="style.css" → 指明 CSS 文件路径-->
</head>
<body> <!-- 网页内容区域，用户可见-->
    <h1>模拟气象站数据</h1> <!-- h1代表一级标题 内容会加粗变大-->

    <div id = "sensor-data">  <!-- div是块级容器，将内容分组  id = "sensor-data" 用于JavaScript获取或操作这部分内容-->
        <p>温度：-- °C</p>
        <p>湿度：-- %</p>
        <p>气压：-- hPa</p>
    </div>

    <button id = "refresh-btn">刷新数据</button> <!-- 创建一个按钮，用户可以点击刷新数据。id="refresh-btn" 方便 JavaScript 绑定点击事件。-->

    <script src = "script.js"></script> <!-- 引入外部 JS 文件 script.js，用来动态更新页面内容。-->

</body>
</html>
